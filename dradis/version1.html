<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRADIS Tactical Console</title>
    <style>
        :root {
            /* Galactica Defaults */
            --primary-color: #00ff41;
            --bg-color: #050805;
            --border-color: #004411;
            --glow: rgba(0, 255, 65, 0.2);
        }

        .pegasus-theme {
            --primary-color: #00d4ff;
            --bg-color: #050510;
            --border-color: #003366;
            --glow: rgba(0, 212, 255, 0.2);
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: all 0.5s ease;
        }

        .controls {
            margin-bottom: 15px;
            z-index: 10;
        }

        button {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: var(--primary-color);
            color: #000;
        }

        #dradis-container {
            position: relative;
            border: 2px solid var(--border-color);
            box-shadow: 0 0 20px var(--glow);
        }

        .overlay {
            position: absolute;
            top: 10px; left: 10px;
            pointer-events: none;
            text-transform: uppercase;
            font-size: 12px;
        }

        .status-bar {
            margin-top: 10px;
            width: 800px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border-color);
            padding-top: 5px;
            font-size: 14px;
        }

        /* Scanline Overlay */
        #dradis-container::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 3px;
            pointer-events: none;
        }
    </style>
</head>
<body id="mainBody">

    <div class="controls">
        <button onclick="toggleTheme()">Switch Registry: <span id="registry-btn">BSG-75</span></button>
    </div>

    <div id="dradis-container">
        <div class="overlay">
            DRADIS RANGE: 2500 SU<br>
            <span id="registry-text">REGISTRY: BSG-75 (GALACTICA)</span><br>
            <span id="contact-count">CONTACTS: 0</span>
        </div>
        <canvas id="dradisCanvas" width="800" height="600"></canvas>
    </div>

    <div class="status-bar">
        <span id="vessel-name">GALACTICA_MAIN_SCAN</span>
        <span id="timestamp"></span>
        <span>SECTOR_6_G_7</span>
    </div>

<script>
    const canvas = document.getElementById('dradisCanvas');
    const ctx = canvas.getContext('2d');
    let isPegasus = false;
    let angle = 0;
    const contacts = [];

    function toggleTheme() {
        isPegasus = !isPegasus;
        const body = document.getElementById('mainBody');
        const regBtn = document.getElementById('registry-btn');
        const regText = document.getElementById('registry-text');
        const vesselName = document.getElementById('vessel-name');

        if (isPegasus) {
            body.classList.add('pegasus-theme');
            regBtn.innerText = "BSG-62";
            regText.innerText = "REGISTRY: BSG-62 (PEGASUS)";
            vesselName.innerText = "PEGASUS_ADVANCED_ARRAY";
        } else {
            body.classList.remove('pegasus-theme');
            regBtn.innerText = "BSG-75";
            regText.innerText = "REGISTRY: BSG-75 (GALACTICA)";
            vesselName.innerText = "GALACTICA_MAIN_SCAN";
        }
    }

    class Contact {
        constructor() { this.reset(); }
        reset() {
            this.x = (Math.random() - 0.5) * 550;
            this.y = (Math.random() - 0.5) * 450;
            this.type = Math.random() > 0.8 ? 'RAIDER' : 'VIPER';
            this.life = 0;
            this.discovered = false;
        }
        draw(colorOverride) {
            if (!this.discovered) return;
            const drawX = canvas.width/2 + this.x;
            const drawY = canvas.height/2 + this.y;
            
            // Raiders stay red, but friendlies follow the ship's theme color
            const color = this.type === 'RAIDER' ? `rgba(255, 50, 50, ${this.life})` : colorOverride.replace(')', `, ${this.life})`).replace('rgb', 'rgba');
            
            ctx.strokeStyle = color;
            ctx.strokeRect(drawX - 5, drawY - 5, 10, 10);
            this.life -= 0.005;
            if (this.life <= 0) { this.discovered = false; this.reset(); }
        }
    }

    for (let i = 0; i < 10; i++) contacts.push(new Contact());

    function animate() {
        const style = getComputedStyle(document.body);
        const primaryColor = style.getPropertyValue('--primary-color').trim();
        const bgColor = style.getPropertyValue('--bg-color').trim();

        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Rings
        ctx.strokeStyle = style.getPropertyValue('--border-color');
        for (let i = 1; i <= 4; i++) {
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, i * 75, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Radar Sweep
        angle += 0.04;
        const sweepX = canvas.width/2 + Math.cos(angle) * 400;
        const sweepY = canvas.height/2 + Math.sin(angle) * 400;
        ctx.strokeStyle = primaryColor;
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, canvas.height/2);
        ctx.lineTo(sweepX, sweepY);
        ctx.stroke();

        contacts.forEach(c => {
            const cAngle = Math.atan2(c.y, c.x);
            const normalizedSweep = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const normalizedContact = ((cAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);

            if (Math.abs(normalizedSweep - normalizedContact) < 0.1) {
                c.discovered = true;
                c.life = 1.0;
            }
            c.draw(primaryColor);
        });

        document.getElementById('timestamp').innerText = new Date().toLocaleTimeString();
        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>
