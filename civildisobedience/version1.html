<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civics Document Lab: Law & Justice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Lora', serif; }
        .document-card { transition: all 0.3s ease; }
        .active-tab { border-bottom: 4px solid #2563eb; color: #2563eb; }
        
        @media print {
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Navigation Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 no-print">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 text-white p-1.5 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                </div>
                <h1 class="font-bold text-xl tracking-tight text-slate-800">Civics<span class="text-blue-600">Lab</span></h1>
            </div>
            <nav class="hidden md:flex gap-6 text-sm font-medium text-slate-500">
                <span class="text-slate-400">Essential Question: Is breaking the law ever justified?</span>
            </nav>
            <button onclick="window.print()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-full text-sm font-semibold transition-colors">
                Save Work (Print)
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Dashboard Header -->
        <div class="mb-10 text-center md:text-left">
            <h2 class="text-3xl font-bold text-slate-900 mb-2">Law vs. Justice DBQ</h2>
            <p class="text-slate-600 max-w-2xl">Analyze the four historical viewpoints below. Use the "Vocabulary Decoder" to help with difficult words, then answer the analysis questions in the notepad.</p>
        </div>

        <!-- Document Tabs -->
        <div class="flex flex-wrap gap-2 mb-8 border-b border-slate-200 no-print">
            <button onclick="showDoc('thoreau')" id="btn-thoreau" class="px-6 py-3 font-semibold text-sm transition-all active-tab">Thoreau</button>
            <button onclick="showDoc('paul')" id="btn-paul" class="px-6 py-3 font-semibold text-sm transition-all text-slate-500 hover:text-blue-600">Alice Paul</button>
            <button onclick="showDoc('king')" id="btn-king" class="px-6 py-3 font-semibold text-sm transition-all text-slate-500 hover:text-blue-600">Dr. King</button>
            <button onclick="showDoc('lincoln')" id="btn-lincoln" class="px-6 py-3 font-semibold text-sm transition-all text-slate-500 hover:text-blue-600">Lincoln</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Document View Area -->
            <div class="lg:col-span-2">
                <div id="doc-content" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 min-h-[500px]">
                    <!-- Dynamic Content Loaded Here -->
                </div>
            </div>

            <!-- Analysis Notepad -->
            <div class="lg:col-span-1">
                <div class="bg-slate-900 text-white p-6 rounded-2xl shadow-xl sticky top-24">
                    <div class="flex items-center gap-2 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        <h3 class="font-bold text-lg">Analysis Notepad</h3>
                    </div>
                    
                    <div id="questions-area">
                        <!-- Questions specific to the doc will load here -->
                    </div>

                    <div class="mt-8 pt-6 border-t border-slate-800">
                        <h4 class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-3">Vocabulary Decoder</h4>
                        <div id="vocab-decoder" class="space-y-3">
                            <!-- Vocab hints -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const docs = {
            thoreau: {
                name: "Henry David Thoreau",
                title: "Civil Disobedience (1849)",
                text: "If the injustice is part of the necessary friction of the machine of government, let it go, let it go... but if it is of such a nature that it requires you to be the agent of injustice to another, then, I say, break the law. Let your life be a counter-friction to stop the machine. What I have to do is to see, at any rate, that I do not lend myself to the wrong which I condemn.",
                questions: [
                    "What does Thoreau say a citizen should do if the government 'machine' requires them to be an agent of injustice?",
                    "What is he saying about a person's responsibility for the actions of their government?"
                ],
                vocab: {
                    "Friction": "Resistance or conflict that slows things down.",
                    "Agent": "Someone who acts on behalf of another; a tool.",
                    "Condemn": "To strongly disapprove of something."
                }
            },
            paul: {
                name: "Alice Paul",
                title: "Jailed for Freedom (1917)",
                text: "We do not consider ourselves subject to this court, since as a disenfranchised class we have nothing to do with the making of the laws which have put us in this position. We are not here because we obstructed traffic, but because we pointed out to the President that he is obstructing the cause of democracy... If the Amendment is not passed, this picketing will go on, and the arrests will go on.",
                questions: [
                    "Why does Alice Paul argue that women are not 'subject' to the court's laws?",
                    "What is the 'cause' she claims she is fighting for?"
                ],
                vocab: {
                    "Disenfranchised": "Denied the right to vote or a voice.",
                    "Subject to": "Under the authority of.",
                    "Obstructing": "Blocking or standing in the way of."
                }
            },
            king: {
                name: "Dr. Martin Luther King Jr.",
                title: "Letter from Birmingham Jail (1963)",
                text: "One may well ask: 'How can you advocate breaking some laws and obeying others?' The answer lies in the fact that there are two types of laws: just and unjust. I would be the first to advocate obeying just laws. One has not only a legal but a moral responsibility to obey just laws. Conversely, one has a moral responsibility to disobey unjust laws. I would agree with St. Augustine that 'an unjust law is no law at all.'",
                questions: [
                    "What is the specific difference between a 'just law' and an 'unjust law' according to King?",
                    "Why does King believe breaking an unjust law is a 'moral responsibility'?"
                ],
                vocab: {
                    "Advocate": "To support or speak in favor of something.",
                    "Conversely": "On the other hand; in an opposite way.",
                    "Moral": "Related to what is right or wrong behavior."
                }
            },
            lincoln: {
                name: "Abraham Lincoln",
                title: "The Lyceum Address (1838)",
                text: "Let every American... swear by the blood of the Revolution, never to violate in the least particular, the laws of the country... Although bad laws, if they exist, should be repealed as soon as possible, still while they continue in force, for the sake of example, they should be religiously observed.",
                questions: [
                    "What does Lincoln argue should happen to 'bad laws' while they are still active?",
                    "What is Lincoln afraid will happen to the country if people stop observing laws strictly?"
                ],
                vocab: {
                    "Violate": "To break or ignore a rule.",
                    "Repealed": "To officially cancel or end a law.",
                    "Religiously observed": "To follow a rule perfectly and with deep respect."
                }
            }
        };

        function showDoc(id) {
            const doc = docs[id];
            
            // Update UI Tabs
            document.querySelectorAll('nav button, .flex button').forEach(b => b.classList.remove('active-tab', 'text-blue-600'));
            document.getElementById(`btn-${id}`).classList.add('active-tab');

            // Load Document Content
            document.getElementById('doc-content').innerHTML = `
                <div class="mb-6">
                    <span class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest">${doc.name}</span>
                    <h3 class="text-3xl font-bold mt-3 text-slate-900">${doc.title}</h3>
                </div>
                <div class="serif text-xl leading-relaxed text-slate-700 bg-slate-50 p-6 rounded-xl border-l-4 border-blue-500 italic">
                    "${doc.text}"
                </div>
                <p class="mt-6 text-sm text-slate-500 font-medium italic">Excerpt from primary source material.</p>
            `;

            // Load Questions
            document.getElementById('questions-area').innerHTML = doc.questions.map((q, i) => `
                <div class="mb-5">
                    <label class="block text-sm font-medium text-slate-400 mb-2">${i+1}. ${q}</label>
                    <textarea class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" rows="3" placeholder="Type answer here..."></textarea>
                </div>
            `).join('');

            // Load Vocab
            document.getElementById('vocab-decoder').innerHTML = Object.entries(doc.vocab).map(([word, def]) => `
                <div>
                    <span class="text-blue-400 font-bold text-sm">${word}:</span>
                    <p class="text-slate-400 text-xs">${def}</p>
                </div>
            `).join('');
        }

        // Initialize with Thoreau
        window.onload = () => showDoc('thoreau');
    </script>
</body>
</html>
